steps:
  # 1. Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - southamerica-east1-docker.pkg.dev/$PROJECT_ID/user-management-api/api:$COMMIT_SHA
      - -t
      - southamerica-east1-docker.pkg.dev/$PROJECT_ID/user-management-api/api:latest
      - .

  # 2. Run tests inside the container (uses SQLite, no DB needed)
  - name: "gcr.io/cloud-builders/docker"
    args:
      - run
      - --rm
      - --entrypoint
      - pytest
      - southamerica-east1-docker.pkg.dev/$PROJECT_ID/user-management-api/api:$COMMIT_SHA
      - tests/
      - --tb=short

  # 3. Push image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - southamerica-east1-docker.pkg.dev/$PROJECT_ID/user-management-api/api:$COMMIT_SHA

  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - southamerica-east1-docker.pkg.dev/$PROJECT_ID/user-management-api/api:latest

  # 4. Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - user-management-api
      - --image=southamerica-east1-docker.pkg.dev/$PROJECT_ID/user-management-api/api:$COMMIT_SHA
      - --region=southamerica-east1
      - --platform=managed
      - --allow-unauthenticated
      - --set-env-vars=DATABASE_URL=$$DATABASE_URL
      - --add-cloudsql-instances=$PROJECT_ID:southamerica-east1:se-challenge-db
    secretEnv:
      - DATABASE_URL

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/DATABASE_URL/versions/latest
      env: DATABASE_URL

images:
  - southamerica-east1-docker.pkg.dev/$PROJECT_ID/user-management-api/api:$COMMIT_SHA
  - southamerica-east1-docker.pkg.dev/$PROJECT_ID/user-management-api/api:latest

options:
  logging: CLOUD_LOGGING_ONLY
