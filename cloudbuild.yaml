steps:
  # 1. Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - southamerica-east1-docker.pkg.dev/$PROJECT_ID/user-management-api/api:$COMMIT_SHA
      - -t
      - southamerica-east1-docker.pkg.dev/$PROJECT_ID/user-management-api/api:latest
      - .

  # 2. Run tests inside the container (uses SQLite, no DB needed)
  - name: "gcr.io/cloud-builders/docker"
    args:
      - run
      - --rm
      - --entrypoint
      - pytest
      - southamerica-east1-docker.pkg.dev/$PROJECT_ID/user-management-api/api:$COMMIT_SHA
      - tests/
      - --tb=short

  # 3. Push image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - southamerica-east1-docker.pkg.dev/$PROJECT_ID/user-management-api/api:$COMMIT_SHA

  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - southamerica-east1-docker.pkg.dev/$PROJECT_ID/user-management-api/api:latest

  # 4. Deploy image to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - user-management-api
      - --image=southamerica-east1-docker.pkg.dev/$PROJECT_ID/user-management-api/api:$COMMIT_SHA
      - --region=southamerica-east1
      - --platform=managed
      - --allow-unauthenticated
      - --add-cloudsql-instances=$PROJECT_ID:us-central1:se-challenge-db
      - --timeout=120

  # 5. Attach DATABASE_URL secret to the service
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - user-management-api
      - --region=southamerica-east1
      - --update-secrets=DATABASE_URL=DATABASE_URL:latest

images:
  - southamerica-east1-docker.pkg.dev/$PROJECT_ID/user-management-api/api:$COMMIT_SHA
  - southamerica-east1-docker.pkg.dev/$PROJECT_ID/user-management-api/api:latest

options:
  logging: CLOUD_LOGGING_ONLY
